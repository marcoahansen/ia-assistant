app:
  embedding:
    provider: ollama
    url: ${LOCAL_EMBEDDING_URL:http://localhost:11434/v1/embeddings}
    api-key: ""
    model: ${LOCAL_EMBEDDING_MODEL:nomic-embed-text}
    dimensions: ${LOCAL_EMBEDDING_DIMENSIONS:768}

  llm:
    url: ${GROQ_LLM_URL:https://api.groq.com/openai/v1/chat/completions}
    api-key: ${GROQ_API_KEY}
    model: ${GROQ_LLM_MODEL:llama-3.3-70b-versatile}
