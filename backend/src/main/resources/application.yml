spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://localhost:5432/assistant
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  storage:
    upload-dir: ./uploads
  cors:
    allowed-origins: http://localhost:5173

  rag:
    top-k: 10
    min-similarity: 0.5
    chunk:
      max-size: 512
      overlap: 64

  embedding:
    provider: openai
    url: https://api.openai.com/v1/embeddings
    api-key: ${EMBEDDING_API_KEY:sk-placeholder}
    model: text-embedding-3-small
    dimensions: 1536

  llm:
    url: https://api.openai.com/v1/chat/completions
    api-key: ${LLM_API_KEY:sk-placeholder}
    model: gpt-4o-mini

  n8n:
    webhook-url: ${N8N_WEBHOOK_URL:http://localhost:5678/webhook/ingestion-complete}

server:
  port: 8080
